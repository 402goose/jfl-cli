# JFL Agent IDE — Default Layout (Developer Mode)
# Launch: tmux-ide or jfl ide
# Layouts: .jfl/layouts/{dev,lead,portfolio,onboard}.yml
name: jfl-workspace

before: jfl context-hub ensure 2>/dev/null

rows:
  - size: 70%
    panes:
      - title: "🧠 Pi Assistant"
        command: jfl pi --mode dev-assist 2>/dev/null || echo "Pi not configured. Run: jfl pi setup"
        size: 40%
        focus: true

      - title: "🔍 Agent Team"
        command: jfl peter agent swarm --rounds 10 2>/dev/null || echo "No agents configured. Run: jfl peter agent create"
        size: 60%

  - size: 30%
    panes:
      - title: "📡 Events"
        command: jfl context-hub events --follow 2>/dev/null || echo "Context Hub not running. Run: jfl context-hub start"
        size: 50%

      - title: "💻 Shell"
        size: 50%

theme:
  accent: colour75
  border: colour238
  bg: colour235
  fg: colour248
