name: JFL AI Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: startsWith(github.head_ref, 'pp/') || contains(github.event.pull_request.labels.*.name, 'ai-review')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' ':!*.test.*' ':!*.spec.*' | head -3000)
          echo "diff<<DIFF_EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "DIFF_EOF" >> $GITHUB_OUTPUT

          FILES=$(git diff origin/main...HEAD --name-only -- '*.ts' '*.tsx' '*.js' '*.jsx')
          echo "files<<FILES_EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "FILES_EOF" >> $GITHUB_OUTPUT

          STATS=$(git diff origin/main...HEAD --stat)
          echo "stats<<STATS_EOF" >> $GITHUB_OUTPUT
          echo "$STATS" >> $GITHUB_OUTPUT
          echo "STATS_EOF" >> $GITHUB_OUTPUT

      - name: AI Review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          DIFF='${{ steps.diff.outputs.diff }}'
          FILES='${{ steps.diff.outputs.files }}'

          # Build review prompt
          PROMPT=$(cat <<'PROMPT_EOF'
          You are a senior code reviewer. Review this PR diff for:
          1. **Bugs** - Logic errors, null/undefined risks, race conditions
          2. **Security** - Injection, XSS, credential exposure, unsafe operations
          3. **Performance** - N+1 queries, unnecessary re-renders, memory leaks
          4. **Test gaps** - What should be tested that isn't

          Be concise. Only flag real issues, not style preferences.
          If the code is clean, say so briefly.

          Format your response as:
          ## Findings
          - [severity] file:line - description

          Where severity is 🔴 (bug/security), 🟡 (perf/logic concern), 🔵 (suggestion)

          If no issues found:
          ## Findings
          No issues found. Code looks clean.
          PROMPT_EOF
          )

          # Build JSON payload
          PAYLOAD=$(node -e "
            const prompt = process.env.REVIEW_PROMPT;
            const diff = process.env.REVIEW_DIFF;
            const title = process.env.PR_TITLE || '';
            const body = process.env.PR_BODY || '';
            console.log(JSON.stringify({
              model: 'gpt-4o-mini',
              messages: [
                { role: 'system', content: prompt },
                { role: 'user', content: 'PR: ' + title + '\n\n' + diff.substring(0, 12000) }
              ],
              max_tokens: 1000,
              temperature: 0.1
            }));
          " 2>/dev/null)

          # Try OpenAI first, fall back to OpenRouter
          REVIEW=""
          if [ -n "$OPENAI_API_KEY" ]; then
            RESPONSE=$(curl -s -X POST https://api.openai.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -d "$PAYLOAD" 2>/dev/null)
            REVIEW=$(echo "$RESPONSE" | node -e "
              let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
                try { console.log(JSON.parse(d).choices[0].message.content); }
                catch(e) { console.log(''); }
              })
            ")
          fi

          if [ -z "$REVIEW" ] && [ -n "$OPENROUTER_API_KEY" ]; then
            echo "OpenAI failed, trying OpenRouter..."
            OR_PAYLOAD=$(echo "$PAYLOAD" | node -e "
              let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
                const j=JSON.parse(d);
                j.model='anthropic/claude-sonnet-4';
                console.log(JSON.stringify(j));
              })
            ")
            RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENROUTER_API_KEY" \
              -d "$OR_PAYLOAD" 2>/dev/null)
            REVIEW=$(echo "$RESPONSE" | node -e "
              let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
                try { console.log(JSON.parse(d).choices[0].message.content); }
                catch(e) { console.log(''); }
              })
            ")
          fi

          if [ -z "$REVIEW" ]; then
            REVIEW="AI review unavailable — no API keys configured or both providers failed."
          fi

          # Save review to file (multiline output is tricky in GH Actions)
          echo "$REVIEW" > /tmp/review.md
          echo "has_review=true" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.review.outputs.has_review == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            const stats = `${{ steps.diff.outputs.stats }}`;
            const marker = '<!-- jfl-ai-review -->';

            const body = `${marker}\n## AI Code Review 🤖\n\n${review}\n\n---\n<details><summary>Diff stats</summary>\n\n\`\`\`\n${stats}\n\`\`\`\n</details>\n\n*Reviewed by JFL AI Review (gpt-4o-mini → claude-sonnet fallback)*`;

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Post review event to hub
        if: always()
        continue-on-error: true
        env:
          JFL_HUB_URL: ${{ secrets.JFL_HUB_URL }}
          JFL_HUB_TOKEN: ${{ secrets.JFL_HUB_TOKEN }}
        run: |
          if [ -n "$JFL_HUB_URL" ]; then
            curl -s -X POST "$JFL_HUB_URL/api/events" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $JFL_HUB_TOKEN" \
              -d "{
                \"type\": \"review:completed\",
                \"source\": \"github-action\",
                \"data\": {
                  \"pr_number\": \"${{ github.event.pull_request.number }}\",
                  \"branch\": \"${{ github.head_ref }}\",
                  \"reviewer\": \"ai\",
                  \"model\": \"gpt-4o-mini\",
                  \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                }
              }" || echo "Hub not available"
          fi
