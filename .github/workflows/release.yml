name: Release

# Triggers after CI passes on main.
# - If changesets exist: creates/updates a "Version Packages" PR
# - If Version PR is merged (no changesets): publishes to npm
#
# npm Trusted Publisher setup (one-time, per package):
#   npmjs.com → jfl package → Settings → Publish Access → Add Provenance
#   Repository: 402goose/jfl-cli
#   Workflow:   .github/workflows/release.yml
#   Environment: (leave blank)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write        # create git tags, push version commits
      pull-requests: write   # create/update the Version Packages PR
      id-token: write        # npm trusted publisher (OIDC provenance)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Check if version is unpublished
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view jfl version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "npm=$NPM_VERSION" >> $GITHUB_OUTPUT
          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "needs_publish=true" >> $GITHUB_OUTPUT
            echo "Version $LOCAL_VERSION not on npm (npm has $NPM_VERSION)"
          else
            echo "needs_publish=false" >> $GITHUB_OUTPUT
            echo "Version $LOCAL_VERSION already on npm"
          fi

      - name: Publish if version bumped
        if: steps.check.outputs.needs_publish == 'true'
        run: |
          npm run build
          npm publish --provenance --access public
          # Create git tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.check.outputs.local }}" || true
          git push origin "v${{ steps.check.outputs.local }}" || true
          echo "Published jfl@${{ steps.check.outputs.local }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.needs_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.local }}
          name: jfl v${{ steps.check.outputs.local }}
          generate_release_notes: true

      - name: Generate changesets from commit messages
        if: steps.check.outputs.needs_publish == 'false'
        run: |
          chmod +x scripts/generate-changesets.sh
          ./scripts/generate-changesets.sh
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset/ || true
          git diff --cached --quiet || git commit -m "chore: auto-generate changesets from commits"

      - name: Create Release PR
        if: steps.check.outputs.needs_publish == 'false'
        uses: changesets/action@v1
        with:
          publish: echo "skipping — publish handled above"
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
