name: JFL AI Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: startsWith(github.head_ref, 'pp/') || contains(github.event.pull_request.labels.*.name, 'ai-review')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get PR diff and review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Get full diff (including test files — review everything)
          git diff origin/main...HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | head -4000 > /tmp/diff.txt
          git diff origin/main...HEAD --stat > /tmp/stats.txt
          git diff origin/main...HEAD --name-only -- '*.ts' '*.tsx' '*.js' '*.jsx' > /tmp/files.txt

          DIFF_SIZE=$(wc -c < /tmp/diff.txt | tr -d ' ')
          echo "Diff size: $DIFF_SIZE bytes"
          echo "Files changed:"
          cat /tmp/files.txt

          if [ "$DIFF_SIZE" -lt 10 ]; then
            echo "No code diff to review" > /tmp/review.md
            echo "has_review=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Build payload via node (safe multiline handling)
          node -e "
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/diff.txt', 'utf8').substring(0, 12000);
            const title = process.env.PR_TITLE || '';

            const payload = {
              model: 'gpt-4o-mini',
              messages: [
                {
                  role: 'system',
                  content: 'You are a senior code reviewer. Review this PR diff for:\\n1. Bugs - Logic errors, null/undefined risks, race conditions\\n2. Security - Injection, XSS, credential exposure, unsafe operations\\n3. Performance - N+1 queries, unnecessary re-renders, memory leaks\\n4. Test gaps - What should be tested that is not\\n\\nBe concise. Only flag real issues, not style preferences. If the code is clean, say so briefly.\\n\\nFormat:\\n## Findings\\n- [severity] file:line - description\\n\\nSeverity: red_circle (bug/security), yellow_circle (perf/logic concern), blue_circle (suggestion)\\n\\nIf no issues: No issues found. Code looks clean.'
                },
                { role: 'user', content: 'PR: ' + title + '\\n\\n' + diff }
              ],
              max_tokens: 1000,
              temperature: 0.1
            };

            fs.writeFileSync('/tmp/payload.json', JSON.stringify(payload));
          "

          # Try OpenAI
          REVIEW=""
          if [ -n "$OPENAI_API_KEY" ]; then
            RESPONSE=$(curl -s -X POST https://api.openai.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -d @/tmp/payload.json 2>/dev/null)
            REVIEW=$(echo "$RESPONSE" | node -e "
              let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
                try { console.log(JSON.parse(d).choices[0].message.content); }
                catch(e) { console.log(''); }
              })
            ")
          fi

          # Fallback to OpenRouter
          if [ -z "$REVIEW" ] && [ -n "$OPENROUTER_API_KEY" ]; then
            echo "OpenAI failed, trying OpenRouter..."
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('/tmp/payload.json', 'utf8'));
              p.model = 'anthropic/claude-sonnet-4';
              fs.writeFileSync('/tmp/payload-or.json', JSON.stringify(p));
            "
            RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENROUTER_API_KEY" \
              -d @/tmp/payload-or.json 2>/dev/null)
            REVIEW=$(echo "$RESPONSE" | node -e "
              let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
                try { console.log(JSON.parse(d).choices[0].message.content); }
                catch(e) { console.log(''); }
              })
            ")
          fi

          if [ -z "$REVIEW" ]; then
            REVIEW="AI review unavailable — both OpenAI and OpenRouter failed."
          fi

          echo "$REVIEW" > /tmp/review.md
          echo "has_review=true" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.review.outputs.has_review == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            const stats = fs.readFileSync('/tmp/stats.txt', 'utf8');
            const marker = '<!-- jfl-ai-review -->';

            const body = [
              marker,
              '## AI Code Review',
              '',
              review,
              '',
              '---',
              '<details><summary>Diff stats</summary>',
              '',
              '```',
              stats,
              '```',
              '</details>',
              '',
              '*Reviewed by JFL AI Review (gpt-4o-mini / claude-sonnet fallback)*'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Post review event to hub
        if: always()
        continue-on-error: true
        env:
          JFL_HUB_URL: ${{ secrets.JFL_HUB_URL }}
          JFL_HUB_TOKEN: ${{ secrets.JFL_HUB_TOKEN }}
        run: |
          if [ -n "$JFL_HUB_URL" ]; then
            curl -s -X POST "$JFL_HUB_URL/api/events" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $JFL_HUB_TOKEN" \
              -d "{
                \"type\": \"review:completed\",
                \"source\": \"github-action\",
                \"data\": {
                  \"pr_number\": \"${{ github.event.pull_request.number }}\",
                  \"branch\": \"${{ github.head_ref }}\",
                  \"reviewer\": \"ai\",
                  \"model\": \"gpt-4o-mini\",
                  \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                }
              }" || echo "Hub not available"
          fi
